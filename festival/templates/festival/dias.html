{% extends 'festival/layout.html' %}

{% block content %}
    <h1>Dias</h1>

    {% for dia in dias %}
        <h3>{{ dia.data }}</h3>

        {% for concerto in dia.concertos.all %}
            <article class="card">
                <a href="{% url 'concerto' concerto.id %}">
                    {{ concerto.banda.nome }} - {{ concerto.palco.nome }} - {{ concerto.hora }}
                </a>
            </article>
        {% empty %}
            <p>Sem concertos neste dia.</p>
        {% endfor %}
    {% endfor %}
{% endblock %}
